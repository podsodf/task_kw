<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工数記録ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F5F3EE;
    --surface:   #FFFFFF;
    --border:    #E0DDD6;
    --border2:   #CCC9C0;
    --text:      #1C1A14;
    --text2:     #6B6760;
    --accent:    #1A5C4E;
    --accent2:   #E8F4F1;
    --accent3:   #B8DDD6;
    --danger:    #C0392B;
    --warn:      #D4870A;
    --warn-bg:   #FEF3E2;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Noto Sans JP', sans-serif;
    --radius:    6px;
    --shadow:    0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
  .app-header { background: var(--accent); color: #fff; padding: 0 24px; height: 54px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .app-header h1 { font-size: 15px; font-weight: 700; letter-spacing: .04em; display: flex; align-items: center; gap: 8px; }
  .app-header h1 span { font-family: var(--mono); font-size: 11px; opacity: .6; font-weight: 400; }
  .tab-bar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 16px; }
  .tab-btn { background: none; border: none; cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--text2); padding: 12px 16px; border-bottom: 2px solid transparent; transition: all .15s; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--bg); }
  .main { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; }
  .card-head { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 13px; letter-spacing: .04em; color: var(--text2); text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }
  .card-body { padding: 18px; }
  .form-grid { display: grid; gap: 12px; }
  .fg-4 { grid-template-columns: 120px 1fr 2fr 90px; }
  .fg-2 { grid-template-columns: 1fr 1fr; }
  label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
  input[type=text], input[type=date], input[type=number], select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border2); border-radius: var(--radius);
    font-family: var(--sans); font-size: 13px; color: var(--text); background: var(--bg);
    transition: border-color .15s, box-shadow .15s; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent2); background: #fff; }
  input[type=number] { font-family: var(--mono); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 700; transition: all .15s; letter-spacing: .02em; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #154e42; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border2); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: none; color: var(--danger); border: 1px solid transparent; font-size: 12px; padding: 4px 8px; }
  .btn-danger:hover { background: #fef2f2; border-color: var(--danger); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-export { background: var(--warn-bg); color: var(--warn); border: 1px solid #F0C060; }
  .btn-export:hover { background: #fde9b8; }
  .btn:disabled { opacity: .4; cursor: default; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; padding: 8px 12px; background: var(--bg); border-bottom: 1px solid var(--border2); text-align: left; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf7; }
  .num { font-family: var(--mono); font-weight: 600; text-align: right; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 30px; font-size: 11px; font-weight: 700; background: var(--accent2); color: var(--accent); }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-box .label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .stat-box .value { font-family: var(--mono); font-size: 26px; font-weight: 600; color: var(--accent); line-height: 1; }
  .stat-box .unit  { font-size: 12px; color: var(--text2); margin-left: 2px; }
  .bar-wrap { margin-top: 4px; background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s ease; }
  .empty { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
  .notice { padding: 10px 14px; border-radius: var(--radius); font-size: 12px; margin-bottom: 12px; }
  .notice-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid #F0C060; }
  .ok-msg { color: var(--accent); font-weight: 700; font-size: 13px; }
  .err-msg { color: var(--danger); font-size: 11px; margin-top: 4px; }
  .month-nav { display: flex; align-items: center; gap: 12px; }
  .month-display { font-family: var(--mono); font-size: 18px; font-weight: 600; min-width: 100px; text-align: center; }
  .hint-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .hint-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  .hint-chip:hover { background: var(--accent2); border-color: var(--accent3); }
  .proj-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px 5px 12px; background: var(--accent2); border: 1px solid var(--accent3); border-radius: 30px; font-size: 12px; font-weight: 700; color: var(--accent); }
  .proj-chip button { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 14px; line-height: 1; padding: 0; opacity: .6; }
  .proj-chip button:hover { opacity: 1; }
  @media (max-width: 600px) {
    .fg-4 { grid-template-columns: 1fr 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10.19.2';
import { useState, useEffect, useMemo } from 'https://esm.sh/preact@10.19.2/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

/* ── Storage ── */
const KEYS = { projects: 'kousu_projects', entries: 'kousu_entries' };
const load = k => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ── サンプルデータ（初回のみ） ── */
const today = new Date();
const fmt = d => d.toISOString().slice(0, 10);
const daysAgo = n => { const d = new Date(today); d.setDate(d.getDate() - n); return fmt(d); };

const SAMPLE_PROJECTS = [
  'CoreTech SEO対策',
  '〇〇社 LP制作',
  '社内業務改善',
];
const SAMPLE_ENTRIES = [
  { id: uid(), date: daysAgo(0), project: 'CoreTech SEO対策',  memo: 'キーワード選定・構成レビュー', hours: 2 },
  { id: uid(), date: daysAgo(0), project: '〇〇社 LP制作',      memo: 'デザインFB対応',              hours: 1.5 },
  { id: uid(), date: daysAgo(1), project: 'CoreTech SEO対策',  memo: 'ベトナム向け仕様書作成',      hours: 3 },
  { id: uid(), date: daysAgo(1), project: '社内業務改善',        memo: 'Make自動化フロー確認',        hours: 1 },
  { id: uid(), date: daysAgo(2), project: '〇〇社 LP制作',      memo: 'ワイヤーフレーム修正',        hours: 2.5 },
  { id: uid(), date: daysAgo(2), project: 'CoreTech SEO対策',  memo: 'クライアントMTG',             hours: 1 },
  { id: uid(), date: daysAgo(3), project: '社内業務改善',        memo: 'Chatwork通知フロー設計',      hours: 2 },
  { id: uid(), date: daysAgo(4), project: '〇〇社 LP制作',      memo: 'コーディング確認・VN連携',    hours: 3 },
  { id: uid(), date: daysAgo(5), project: 'CoreTech SEO対策',  memo: '競合調査レポート作成',        hours: 2.5 },
  { id: uid(), date: daysAgo(6), project: '社内業務改善',        memo: 'ツール検証・ドキュメント整備', hours: 1.5 },
];

function initData() {
  if (!localStorage.getItem(KEYS.projects)) save(KEYS.projects, SAMPLE_PROJECTS);
  if (!localStorage.getItem(KEYS.entries))  save(KEYS.entries,  SAMPLE_ENTRIES);
}
initData();

/* ── CSV ── */
function downloadCSV(rows, filename) {
  const csv  = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ════════ App ════════ */
function App() {
  const [tab,      setTab]      = useState('entry');
  const [projects, setProjects] = useState(() => load(KEYS.projects));
  const [entries,  setEntries]  = useState(() => load(KEYS.entries));
  const now = new Date();
  const [viewYear,  setViewYear]  = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth() + 1);

  useEffect(() => save(KEYS.projects, projects), [projects]);
  useEffect(() => save(KEYS.entries,  entries),  [entries]);

  const addProject = name => {
    if (!name.trim() || projects.includes(name.trim())) return false;
    setProjects(p => [...p, name.trim()]); return true;
  };
  const removeProject = name => setProjects(p => p.filter(x => x !== name));
  const addEntry = e => setEntries(a => [{ ...e, id: uid() }, ...a]);
  const delEntry = id => setEntries(a => a.filter(x => x.id !== id));

  const TABS = [
    { k: 'entry',    l: '入力' },
    { k: 'log',      l: '記録一覧' },
    { k: 'summary',  l: '月次集計' },
    { k: 'projects', l: '案件管理' },
  ];

  return html`<div>
    <header class="app-header">
      <h1>⏱ 工数記録ツール <span>v1.0</span></h1>
    </header>
    <nav class="tab-bar">
      ${TABS.map(t => html`
        <button class=${'tab-btn' + (tab === t.k ? ' active' : '')} onClick=${() => setTab(t.k)}>${t.l}</button>
      `)}
    </nav>
    <main class="main">
      ${tab === 'entry'    && html`<${EntryTab}    projects=${projects} addEntry=${addEntry} />`}
      ${tab === 'log'      && html`<${LogTab}      entries=${entries} projects=${projects} delEntry=${delEntry} />`}
      ${tab === 'summary'  && html`<${SummaryTab}  entries=${entries} year=${viewYear} month=${viewMonth} setYear=${setViewYear} setMonth=${setViewMonth} />`}
      ${tab === 'projects' && html`<${ProjectsTab} projects=${projects} entries=${entries} addProject=${addProject} removeProject=${removeProject} />`}
    </main>
  </div>`;
}

/* ════════ EntryTab ════════ */
function EntryTab({ projects, addEntry }) {
  const today = new Date().toISOString().slice(0, 10);
  const [form, setForm] = useState({ date: today, project: projects[0] || '', memo: '', hours: '' });
  const [ok, setOk] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const valid = form.date && form.project && form.hours && parseFloat(form.hours) > 0;

  const submit = () => {
    if (!valid) return;
    addEntry({ ...form, hours: parseFloat(form.hours) });
    setForm(f => ({ ...f, project: projects[0] || '', memo: '', hours: '' }));
    setOk(true); setTimeout(() => setOk(false), 2000);
  };

  const HINTS = [[0.25,'15分'],[0.5,'30分'],[0.75,'45分'],[1,'1時間'],[1.5,'1.5h'],[2,'2時間'],[3,'3時間'],[4,'半日'],[8,'1日']];

  return html`<div>
    ${!projects.length && html`<div class="notice notice-warn">⚠ まず「案件管理」タブで案件を登録してください</div>`}
    <div class="card">
      <div class="card-head">工数を入力</div>
      <div class="card-body">
        <div class="form-grid fg-4" style="margin-bottom:12px">
          <div>
            <label>日付</label>
            <input type="date" value=${form.date} onChange=${e => set('date', e.target.value)} />
          </div>
          <div>
            <label>案件名</label>
            <select value=${form.project} onChange=${e => set('project', e.target.value)}>
              <option value="">-- 案件を選択 --</option>
              ${projects.map(p => html`<option value=${p}>${p}</option>`)}
            </select>
          </div>
          <div>
            <label>作業メモ</label>
            <input type="text"
              placeholder="例：クライアントMTG・LP修正・仕様書作成"
              value=${form.memo}
              onChange=${e => set('memo', e.target.value)} />
          </div>
          <div>
            <label>時間 (h)</label>
            <input type="number" step="0.25" min="0.25" max="24"
              placeholder="例：1.5"
              value=${form.hours}
              onChange=${e => set('hours', e.target.value)} />
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <button class="btn btn-primary" onClick=${submit} disabled=${!valid}>＋ 記録する</button>
          ${ok && html`<span class="ok-msg">✓ 登録しました</span>`}
        </div>
        <div class="hint-grid">
          ${HINTS.map(([v, l]) => html`
            <div class="hint-chip" onClick=${() => set('hours', v)}>
              <span style="font-family:var(--mono);font-weight:600;color:var(--accent)">${v}</span>
              <span style="color:var(--text2);margin-left:4px">${l}</span>
            </div>
          `)}
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:8px">時間のボタンをクリックすると入力されます</div>
      </div>
    </div>
  </div>`;
}

/* ════════ LogTab ════════ */
function LogTab({ entries, projects, delEntry }) {
  const [fp, setFp] = useState('');
  const [fm, setFm] = useState('');

  const months = useMemo(() =>
    [...new Set(entries.map(e => e.date.slice(0, 7)))].sort().reverse(), [entries]);

  const filtered = useMemo(() => entries.filter(e => {
    if (fp && e.project !== fp) return false;
    if (fm && !e.date.startsWith(fm)) return false;
    return true;
  }), [entries, fp, fm]);

  const total = filtered.reduce((s, e) => s + e.hours, 0);

  const exp = () => {
    const rows = [['日付','案件名','作業メモ','時間(h)']];
    filtered.forEach(e => rows.push([e.date, e.project, e.memo || '', e.hours]));
    downloadCSV(rows, `工数記録_${fm || '全期間'}.csv`);
  };

  return html`<div>
    <div class="card">
      <div class="card-head">絞り込み</div>
      <div class="card-body">
        <div class="form-grid fg-2">
          <div>
            <label>月</label>
            <select value=${fm} onChange=${e => setFm(e.target.value)}>
              <option value="">全期間</option>
              ${months.map(m => html`<option value=${m}>${m}</option>`)}
            </select>
          </div>
          <div>
            <label>案件</label>
            <select value=${fp} onChange=${e => setFp(e.target.value)}>
              <option value="">すべての案件</option>
              ${projects.map(p => html`<option value=${p}>${p}</option>`)}
            </select>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head">
        <span>${filtered.length}件 ／ 合計
          <span style="font-family:var(--mono);color:var(--accent)">${total.toFixed(2)}h</span>
        </span>
        <button class="btn btn-export btn-sm" onClick=${exp}>⬇ CSVエクスポート</button>
      </div>
      ${!filtered.length
        ? html`<div class="empty">該当する記録がありません</div>`
        : html`<table>
            <thead><tr>
              <th>日付</th><th>案件名</th><th>作業メモ</th>
              <th style="text-align:right">時間</th><th></th>
            </tr></thead>
            <tbody>
              ${filtered.map(e => html`<tr key=${e.id}>
                <td style="font-family:var(--mono);white-space:nowrap;font-size:12px">${e.date}</td>
                <td><span class="tag">${e.project}</span></td>
                <td style="color:var(--text2);font-size:12px">${e.memo || '—'}</td>
                <td class="num">${e.hours.toFixed(2)}<span style="font-size:11px;color:var(--text2)"> h</span></td>
                <td>
                  <button class="btn btn-danger" onClick=${() => { if (confirm('この記録を削除しますか？')) delEntry(e.id); }}>✕</button>
                </td>
              </tr>`)}
            </tbody>
          </table>`
      }
    </div>
  </div>`;
}

/* ════════ SummaryTab ════════ */
function SummaryTab({ entries, year, month, setYear, setMonth }) {
  const prev = () => { if (month === 1) { setYear(y => y-1); setMonth(12); } else setMonth(m => m-1); };
  const next = () => { if (month === 12) { setYear(y => y+1); setMonth(1); } else setMonth(m => m+1); };

  const prefix = `${year}-${String(month).padStart(2, '0')}`;
  const me = useMemo(() => entries.filter(e => e.date.startsWith(prefix)), [entries, prefix]);
  const total = me.reduce((s, e) => s + e.hours, 0);
  const days  = new Set(me.map(e => e.date)).size;

  const byProject = useMemo(() => {
    const m = {};
    me.forEach(e => { m[e.project] = (m[e.project] || 0) + e.hours; });
    return Object.entries(m).sort((a, b) => b[1] - a[1]);
  }, [me]);

  const byDate = useMemo(() => {
    const m = {};
    me.forEach(e => { m[e.date] = (m[e.date] || 0) + e.hours; });
    return Object.entries(m).sort();
  }, [me]);

  const expSum = () => {
    const rows = [['案件名','時間(h)','割合(%)']];
    byProject.forEach(([p, h]) => rows.push([p, h.toFixed(2), (total > 0 ? (h/total*100).toFixed(1) : '0')]));
    rows.push(['合計', total.toFixed(2), '100.0']);
    downloadCSV(rows, `工数集計_${prefix}.csv`);
  };
  const expDetail = () => {
    const rows = [['日付','案件名','作業メモ','時間(h)']];
    [...me].sort((a,b) => a.date.localeCompare(b.date)).forEach(e => rows.push([e.date, e.project, e.memo||'', e.hours]));
    downloadCSV(rows, `工数詳細_${prefix}.csv`);
  };

  return html`<div>
    <div class="card">
      <div class="card-body" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div class="month-nav">
          <button class="btn btn-secondary btn-sm" onClick=${prev}>◀</button>
          <div class="month-display">
            ${year}<span style="font-size:14px;opacity:.6">年</span>${String(month).padStart(2,'0')}<span style="font-size:14px;opacity:.6">月</span>
          </div>
          <button class="btn btn-secondary btn-sm" onClick=${next}>▶</button>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-export btn-sm" onClick=${expSum}>⬇ 集計CSV</button>
          <button class="btn btn-secondary btn-sm" onClick=${expDetail}>⬇ 詳細CSV</button>
        </div>
      </div>
    </div>

    ${!me.length
      ? html`<div class="card"><div class="empty">この月の記録はありません</div></div>`
      : html`
        <div class="summary-grid">
          <div class="stat-box"><div class="label">合計工数</div><div class="value">${total.toFixed(1)}<span class="unit">h</span></div></div>
          <div class="stat-box"><div class="label">稼働日数</div><div class="value">${days}<span class="unit">日</span></div></div>
          <div class="stat-box"><div class="label">案件数</div><div class="value">${byProject.length}<span class="unit">件</span></div></div>
        </div>

        <div class="card">
          <div class="card-head">案件別集計</div>
          <table>
            <thead><tr>
              <th>案件名</th>
              <th style="text-align:right">時間</th>
              <th style="text-align:right">割合</th>
              <th style="min-width:120px">バー</th>
            </tr></thead>
            <tbody>
              ${byProject.map(([p, h]) => html`<tr key=${p}>
                <td><span class="tag">${p}</span></td>
                <td class="num">${h.toFixed(2)}<span style="font-size:11px;color:var(--text2)"> h</span></td>
                <td class="num" style="color:var(--text2);font-size:12px">${total > 0 ? (h/total*100).toFixed(1) : 0}%</td>
                <td><div class="bar-wrap"><div class="bar-fill" style="width:${total > 0 ? h/total*100 : 0}%"></div></div></td>
              </tr>`)}
              <tr style="background:var(--accent2);font-weight:700">
                <td>合計</td>
                <td class="num" style="color:var(--accent)">${total.toFixed(2)}<span style="font-size:11px"> h</span></td>
                <td></td><td></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="card">
          <div class="card-head">日別工数</div>
          <table>
            <thead><tr>
              <th>日付</th>
              <th style="text-align:right">時間</th>
              <th>バー（8h基準）</th>
            </tr></thead>
            <tbody>
              ${byDate.map(([d, h]) => html`<tr key=${d}>
                <td style="font-family:var(--mono);font-size:12px">${d}</td>
                <td class="num">${h.toFixed(2)}<span style="font-size:11px;color:var(--text2)"> h</span></td>
                <td><div class="bar-wrap"><div class="bar-fill" style="width:${Math.min(h/8*100, 100)}%;background:var(--accent3)"></div></div></td>
              </tr>`)}
            </tbody>
          </table>
        </div>
      `}
  </div>`;
}

/* ════════ ProjectsTab ════════ */
function ProjectsTab({ projects, entries, addProject, removeProject }) {
  const [input, setInput] = useState('');
  const [err,   setErr]   = useState('');

  const add = () => {
    const n = input.trim();
    if (!n) return;
    if (!addProject(n)) { setErr('同じ名前の案件がすでに登録されています'); return; }
    setInput(''); setErr('');
  };

  const cntFor = n => entries.filter(e => e.project === n).length;
  const hFor   = n => entries.filter(e => e.project === n).reduce((s, e) => s + e.hours, 0);

  return html`<div>
    <div class="card">
      <div class="card-head">案件を追加</div>
      <div class="card-body">
        <div style="display:flex;gap:8px;align-items:flex-end">
          <div style="flex:1">
            <label>案件名</label>
            <input type="text"
              placeholder="例：〇〇社 コーポレートサイトリニューアル"
              value=${input}
              onChange=${e => { setInput(e.target.value); setErr(''); }}
              onKeyDown=${e => e.key === 'Enter' && add()}
              maxlength="40" />
            ${err && html`<div class="err-msg">${err}</div>`}
          </div>
          <button class="btn btn-primary" onClick=${add}>＋ 追加</button>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:8px">Enter キーでも追加できます</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">登録済み案件（${projects.length}件）</div>
      ${!projects.length
        ? html`<div class="empty">案件がまだ登録されていません</div>`
        : html`<table>
            <thead><tr>
              <th>案件名</th>
              <th style="text-align:right">記録件数</th>
              <th style="text-align:right">累計工数</th>
              <th></th>
            </tr></thead>
            <tbody>
              ${projects.map(p => html`<tr key=${p}>
                <td><span class="tag">${p}</span></td>
                <td class="num" style="color:var(--text2)">${cntFor(p)}<span style="font-size:11px"> 件</span></td>
                <td class="num">${hFor(p).toFixed(2)}<span style="font-size:11px;color:var(--text2)"> h</span></td>
                <td>
                  <button class="btn btn-danger"
                    onClick=${() => { if (confirm(`「${p}」を削除しますか？\n※記録データは残ります`)) removeProject(p); }}>
                    ✕
                  </button>
                </td>
              </tr>`)}
            </tbody>
          </table>`
      }
    </div>
  </div>`;
}

render(h(App, null), document.getElementById('app'));
</script>
</body>
</html>
